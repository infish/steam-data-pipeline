services:

  mysql:
    image: mysql:8.0

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: steam_pipeline

    ports:
      - "3307:3306"
    
    volumes:
      - ./init:/docker-entrypoint-initdb.d
    
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  pipeline:
    build: .

    depends_on:
      mysql:
        condition: service_healthy

    env_file:
      - .env